version: '3.8'

services:
  frogfan:
    image: ghcr.io/derenrich/frogfan:latest
    ports:
      - "3000:3000"
    volumes:
      - ./data:/app/data
      # Mount the user's host media directly to the container so it can be browsed.
      # You can change this path to wherever your media is located.
      - /Users/derenrich/oss:/host_media
    environment:
      - DATA_DIR=/app/data
      - NODE_ENV=production
    restart: unless-stopped
